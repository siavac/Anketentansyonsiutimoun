<!DOCTYPE html>
<html lang="ht">
<head>
<meta charset="UTF-8">
<title>SIAVAC - Verifikasyon Timoun</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body {
    font-family: Arial;
    background: #eee;
    padding: 20px;
}

.container {
    background: white;
    padding: 25px;
    max-width: 900px;
    margin: auto;
}

.header {
    text-align: center;
}

.logo {
    width: 120px;
}

.question {
    margin-top: 15px;
    font-weight: bold;
}

textarea {
    width: 100%;
    height: 60px;
}
button {
    margin-top: 20px;
    padding: 10px;
    background: green;
    color: white;
}
</style>
</head>

<body>

<div class="container" id="content">

<div class="header">
    <img id="logo" class="logo" src="https://i.ibb.co/zTz2rrh8/sketch-1782265870898.jpg">
    <h3>SIAVAC - Service Intelligence Antivol Anti-Crime</h3>
</div>

<h2>FÒMILÈ VERIFIKASYON TIMOUN</h2>

<div class="question">1. Poukisa ou bezwen pran yon timoun?</div>
<textarea></textarea>

<div class="question">2. Poukisa ou chwazi yon timoun ki pa fanmi ou?</div>
<textarea></textarea>

<div class="question">3. Poukisa ou vle timoun nan rete lakay ou?</div>
<textarea></textarea>

<div class="question">4. Ki laj timoun w ap chèche a?</div>
<textarea></textarea>

<div class="question">5. Ki kote timoun nan pral rete?</div>
<textarea></textarea>

<button onclick="generatePDF()">Telechaje PDF</button>

</div>

<script>
async function generatePDF() {

    const logo = document.getElementById("logo");

    // 🔥 KONVÈTI LOGO A NAN BASE64 (sa rezoud pwoblèm nan)
    const toDataURL = url => fetch(url)
        .then(res => res.blob())
        .then(blob => new Promise(resolve => {
            const reader = new FileReader();
            reader.onloadend = () => resolve(reader.result);
            reader.readAsDataURL(blob);
        }));

    const base64 = await toDataURL(logo.src);
    logo.src = base64;

    const element = document.getElementById("content");

    const opt = {
        margin: 0.5,
        filename: 'SIAVAC_Verifikasyon.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save();
}
</script>

</body>
</html>
